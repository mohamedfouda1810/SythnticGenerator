version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: synthgen_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./synthgen.db
      - SECRET_KEY=${SECRET_KEY:-synthgen-secret-change-in-production-min-32-chars}
      - CORS_ORIGINS=["http://localhost","http://localhost:80"]
      - ACCESS_TOKEN_EXPIRE_HOURS=24
      - MAX_FILE_SIZE_MB=10
      - MAX_ROWS=50000
      - DEFAULT_EPOCHS=100
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: synthgen_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:

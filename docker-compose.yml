version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: synthgen_postgres
    environment:
      POSTGRES_DB: synthgen
      POSTGRES_USER: synthgen_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synthgen_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synthgen_user -d synthgen" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: synthgen_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://synthgen_user:${POSTGRES_PASSWORD:-synthgen_dev_password}@postgres:5432/synthgen
      - SECRET_KEY=${SECRET_KEY:-synthgen-secret-change-in-production}
      - CORS_ORIGINS=["http://localhost","http://localhost:80"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: synthgen_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:
